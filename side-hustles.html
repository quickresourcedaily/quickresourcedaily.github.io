    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Side Hustles & Passive Income | QuickResourceDaily</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #10b981; --dark: #0f172a; --light: #f8fafc; --text: #475569; --white: #ffffff; --border: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: var(--light); color: var(--text); margin: 0; }
        
        nav { background: var(--white); padding: 1rem 2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .logo { font-weight: 800; color: var(--dark); text-decoration: none; }

        .header-section { background: var(--dark); color: white; padding: 60px 20px; text-align: center; }
        .header-section h1 { font-size: 2.5rem; margin-bottom: 10px; }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        
        /* GRID FOR HUSTLE CARDS */
        #hustle-feed {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .hustle-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            text-decoration: none;
            color: inherit;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
        }

        .hustle-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-color: var(--primary); }
        .tag { color: var(--primary); font-weight: 800; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 10px; }
        .hustle-card h2 { margin: 0 0 10px 0; font-size: 1.25rem; color: var(--dark); }
        .hustle-card p { font-size: 0.9rem; flex-grow: 1; margin-bottom: 20px; }
        .date { font-size: 0.8rem; color: #94a3b8; }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">QuickResourceDaily</a>
    <a href="index.html" style="text-decoration:none; color:var(--primary); font-weight:700;">← Home</a>
</nav>

<header class="header-section">
    <h1>💰 Side Hustle Blueprints</h1>
    <p>Realistic strategies for $1,000/month passive income in 2026.</p>
</header>

<main class="container">
    <div id="hustle-feed">
        <p>Loading profitable opportunities...</p>
    </div>
</main>

<script>
    async function loadHustles() {
        try {
            const response = await fetch('articles.json');
            const articles = await response.json();
            const feed = document.getElementById('hustle-feed');
            
            // THE FILTER: Only show "Side Hustles"
            const hustlesOnly = articles.filter(post => post.category === "Side Hustles");

            if (hustlesOnly.length === 0) {
                feed.innerHTML = "<p>New hustles coming soon!</p>";
                return;
            }

            feed.innerHTML = hustlesOnly.map(post => `
                <a href="${post.url}" class="hustle-card">
                    <span class="tag">${post.category}</span>
                    <h2>${post.title}</h2>
                    <p>${post.description}</p>
                    <span class="date">Updated: ${post.date}</span>
                </a>
            `).join('');
            
        } catch (e) {
            console.error("Error:", e);
        }
    }
    window.onload = loadHustles;
</script>

</body>
