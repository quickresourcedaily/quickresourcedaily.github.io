<!DOCTYPE html>
<html lang="en">
<head>

<link rel="sitemap" type="application/xml" href="/sitemap.xml" />

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QuickResourceDaily | Tech Guides, Side Hustles & AI</title>
<meta name="description" content="Expert-led Android troubleshooting, AI strategies, and side hustle guides.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
:root {
    --primary:#2563eb;
    --dark:#0f172a;
    --light:#f8fafc;
    --text:#475569;
    --white:#fff;
    --border:#e2e8f0;
}

body {
    font-family:'Inter',sans-serif;
    background:var(--light);
    margin:0;
}

nav {
    background:#fff;
    padding:1rem;
    display:flex;
    justify-content:space-between;
}

.container {
    max-width:1100px;
    margin:30px auto;
    padding:0 20px;
}

.article-item {
    display:flex;
    gap:20px;
    border-bottom:1px solid var(--border);
    padding:20px 0;
    text-decoration:none;
}

.article-item img {
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:10px;
}

.info h2 {
    margin:0;
    color:var(--dark);
}

.tag {
    font-size:0.7rem;
    font-weight:800;
    color:var(--primary);
}

.cat-btn {
    padding:8px 15px;
    margin:5px;
    border-radius:20px;
    border:1px solid var(--border);
    cursor:pointer;
    font-weight:700;
}

.cat-btn.active {
    background:var(--primary);
    color:white;
}
</style>

</head>

<body>

<nav>
<strong>QuickResourceDaily</strong>
</nav>

<section style="background:#0f172a;color:white;padding:40px;text-align:center;">
<h1>Master the Digital Frontier</h1>
<input id="searchInput" placeholder="Search..." style="padding:12px;width:300px;border-radius:30px;border:none;">
</section>

<div style="text-align:center;margin-top:10px;">
<button class="cat-btn active" onclick="filterCategory('All')">All</button>
<button class="cat-btn" onclick="filterCategory('Tech')">Tech</button>
<button class="cat-btn" onclick="filterCategory('AI')">AI</button>
<button class="cat-btn" onclick="filterCategory('Make Money Online')">Money</button>
</div>

<div class="container">
<div id="articles"></div>
</div>

<script>
let allPosts = [];

async function loadArticles() {
    const res = await fetch('index.json');
    let posts = await res.json();

    // Sort newest first
    posts.sort((a,b)=> new Date(b.date) - new Date(a.date));

    allPosts = posts;
    displayPosts(posts);
}

function displayPosts(posts){
    const container = document.getElementById('articles');
    container.innerHTML = '';

    posts.forEach(p=>{
        container.innerHTML += `
        <a href="${p.url}" class="article-item">
            <img src="${p.image}">
            <div class="info">
                <span class="tag">${p.category}</span>
                <h2>${p.title}</h2>
                <p>${p.description}</p>
            </div>
        </a>`;
    });
}

function filterCategory(cat){
    document.querySelectorAll('.cat-btn').forEach(btn=>btn.classList.remove('active'));
    event.target.classList.add('active');

    if(cat==="All"){
        displayPosts(allPosts);
    } else {
        displayPosts(allPosts.filter(p=>p.category.includes(cat)));
    }
}

document.getElementById("searchInput").addEventListener("input", function(){
    let val = this.value.toLowerCase();
    let filtered = allPosts.filter(p =>
        p.title.toLowerCase().includes(val) ||
        p.description.toLowerCase().includes(val)
    );
    displayPosts(filtered);
});

loadArticles();
</script>

</body>
</html>
