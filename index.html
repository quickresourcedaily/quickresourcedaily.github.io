<!DOCTYPE html>
<html lang="en">
<head>

<link rel="sitemap" type="application/xml" href="/sitemap.xml" />

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QuickResourceDaily | Tech Guides, Side Hustles & AI</title>
<meta name="description" content="Expert-led Android troubleshooting, AI strategies, and side hustle guides.">

<link href="https://fonts.googleapis.com" rel="stylesheet">

<style>
:root {
    --primary:#2563eb;
    --primary-hover: #1d4ed8;
    --dark:#0f172a;
    --light:#f8fafc;
    --text:#475569;
    --white:#fff;
    --border:#e2e8f0;
}

body {
    font-family:'Inter',sans-serif;
    background:var(--light);
    margin:0;
    line-height: 1.5;
}

nav {
    background:#fff;
    padding:1rem;
    display:flex;
    justify-content:space-between;
    font-weight:700;
    border-bottom: 1px solid var(--border);
}

.container {
    max-width:900px; 
    margin:30px auto;
    padding:0 20px;
}

.article-item {
    display:flex;
    gap:30px; 
    border-bottom:1px solid var(--border);
    padding:30px 0;
    text-decoration:none;
    color:inherit;
    align-items: stretch; /* Stretch helps align internal buttons */
    transition: transform 0.2s ease;
}

.article-item:hover {
    transform: translateY(-2px);
}

.article-item img {
    width:180px;
    height:180px;
    object-fit:cover;
    border-radius:12px;
    flex-shrink: 0; 
    background: #eee;
}

.info {
    display: flex;
    flex-direction: column;
    flex-grow: 1; /* Takes up all available space */
}

.tag {
    font-size:0.75rem;
    font-weight:800;
    color:var(--primary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
}

.info h2 {
    margin:0;
    color:var(--dark);
    font-size: 1.5rem;
    line-height: 1.2;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.info p {
    margin: 10px 0;
    color: var(--text);
    font-size: 1rem;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

/* The Read More Button */
.read-more {
    margin-top: auto; /* Pushes the button to the absolute bottom */
    color: var(--primary);
    font-weight: 700;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 5px;
}

.read-more::after {
    content: '→';
    transition: transform 0.2s;
}

.article-item:hover .read-more::after {
    transform: translateX(5px);
}

.cat-btn {
    padding:8px 18px;
    margin:5px;
    border-radius:20px;
    border:1px solid var(--border);
    cursor:pointer;
    font-weight:600;
    background:white;
    transition: all 0.2s;
}

.cat-btn.active {
    background:var(--primary);
    color:white;
    border-color: var(--primary);
}

#searchInput {
    padding:14px 24px;
    width:100%;
    max-width:450px;
    border-radius:30px;
    border:none;
    font-size: 1rem;
    outline: none;
    box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
}

@media (max-width: 700px) {
    .article-item {
        flex-direction: column;
        gap: 15px;
    }
    .article-item img {
        width: 100%;
        height: 220px;
    }
}
</style>

</head>

<body>

<nav>
<strong>QuickResourceDaily</strong>
</nav>

<section style="background:#0f172a;color:white;padding:80px 20px;text-align:center;">
<h1 style="margin-bottom:30px; font-size: 2.8rem; letter-spacing: -0.02em;">Master the Digital Frontier</h1>
<input id="searchInput" placeholder="Search for guides, tools, or tips...">
</section>

<div style="text-align:center;margin-top:25px;">
<button class="cat-btn active" onclick="filterCategory('All', this)">All</button>
<button class="cat-btn" onclick="filterCategory('Tech', this)">Tech</button>
<button class="cat-btn" onclick="filterCategory('AI', this)">AI</button>
<button class="cat-btn" onclick="filterCategory('Make Money Online', this)">Money</button>
</div>

<div class="container">
<div id="articles"></div>
</div>

<script>
let allPosts = [];

async function loadArticles() {
    try {
        const res = await fetch('/index.json');
        const posts = await res.json();
        posts.sort((a, b) => new Date(b.date) - new Date(a.date));
        allPosts = posts;
        displayPosts(posts);
    } catch (err) {
        console.error("Failed to load index.json:", err);
        document.getElementById('articles').innerHTML = "<p style='text-align:center; padding: 40px;'>Error loading articles.</p>";
    }
}

function displayPosts(posts) {
    const container = document.getElementById('articles');
    container.innerHTML = '';

    if (!posts.length) {
        container.innerHTML = "<p style='text-align:center; padding: 40px;'>No articles found.</p>";
        return;
    }

    posts.forEach(p => {
        container.innerHTML += `
        <a href="${p.url}" class="article-item">
            <img src="${p.image}" alt="${p.title}" loading="lazy">
            <div class="info">
                <span class="tag">${p.category}</span>
                <h2>${p.title}</h2>
                <p>${p.description}</p>
                <div class="read-more">Read Article</div>
            </div>
        </a>`;
    });
}

function filterCategory(cat, btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (cat === "All") displayPosts(allPosts);
    else displayPosts(allPosts.filter(p => p.category.includes(cat)));
}

document.getElementById("searchInput").addEventListener("input", function () {
    let val = this.value.toLowerCase();
    let filtered = allPosts.filter(p =>
        p.title.toLowerCase().includes(val) ||
        p.description.toLowerCase().includes(val) ||
        p.category.toLowerCase().includes(val)
    );
    displayPosts(filtered);
});

loadArticles();
</script>

</body>
</html>
