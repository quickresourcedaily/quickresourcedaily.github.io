    <style>
        :root {
            --navy: #0f172a;
            --blue: #2563eb;
            --gold: #d4af37;

        body {

            border-bottom: 1px solid var(--border);
            padding: 12px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--navy), var(--blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--navy);
            font-size: 0.85rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .nav-links a:hover { color: var(--blue); }

        .hero {
            padding: 80px 20px;
            text-align: center;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white;
            position: relative;
        }

        .hero h2 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            margin-bottom: 24px;
            letter-spacing: -0.03em;
        }

        .hero span { color: var(--gold); }

        .search-container {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        #searchInput {
            padding: 18px 25px;
            width: 100%;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        #searchInput:focus {
            background: white;
            color: var(--navy);
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.3);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-left: 4px solid var(--gold);
            padding-left: 15px;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin: 0;
        }

        .featured-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .featured-card {
            background: var(--card);
            border-radius: 20px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            box-shadow: var(--shadow);
            transition: 0.3s;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .featured-card:hover {
            transform: translateY(-8px);
            border-color: var(--gold);
        }

        .featured-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .badge {
            background: var(--gold-light);
            color: #856404;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .featured-content { padding: 25px; }
        .featured-content h3 { margin: 0 0 10px; font-size: 1.25rem; line-height: 1.3; }
        .featured-content p { font-size: 0.95rem; color: var(--muted); margin: 0; }

        .article-list { display: grid; gap: 20px; }

        .article-item {
            display: flex;
            gap: 20px;
            background: white;
            padding: 15px;
            border-radius: 16px;
            text-decoration: none;
            color: inherit;
            border: 1px solid var(--border);
            transition: 0.2s;
            align-items: center;
        }

        .article-item:hover { background: #f1f5f9; border-color: var(--blue); }

        .article-item img {
            width: 140px;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
            flex-shrink: 0;
        }

        .article-info h3 { margin: 0 0 5px; font-size: 1.1rem; }
        .article-info p { margin: 0; font-size: 0.9rem; color: var(--muted); }

        .pagination {

        .pagination button {

            border: 1px solid var(--border);

            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .pagination button.active {
            background: var(--navy);
            color: white;
            border-color: var(--navy);
        }

        footer {
            background: var(--navy);
            color: white;
            padding: 60px 20px;
            text-align: center;

        @media (max-width: 768px) {

            .hero { padding: 60px 15px; }
            .hero h2 { font-size: 2.2rem; }

        }

        @media (max-width: 500px) {

<body>

<header>
    <h1>QuickResourceDaily</h1>
    <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/about.html">About</a>
        <a href="/contact.html">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Master the <span>Digital Frontier</span></h2>
    <div class="search-container">
        <input id="searchInput" placeholder="Search tech, AI, or money guides...">
    </div>
</section>

<div class="container">
    <div id="featured-section">
        <div class="section-header">
            <h2 class="section-title">🔥 Featured Insights</h2>
        </div>
        <div class="featured-grid" id="featured"></div>
    </div>

    <div class="section-header">
        <h2 class="section-title">Latest Updates</h2>
    </div>
    <div class="article-list" id="articles"></div>

    <div class="pagination" id="pagination"></div>
</div>

<script>
let allPosts = [];
const perPage = 6;
let currentPage = 1;

function fixPath(path) {
    if(!path || path === "undefined") return 'https://via.placeholder.com/400x250?text=QuickResourceDaily';
    let clean = path.replace(/^\/+/, '').replace(/^\.\.\/+/, '');
    return '/' + clean;
}

async function loadPosts(){
    try {
        const res = await fetch('/index.json?v=' + Date.now());
        const posts = await res.json();
        allPosts = posts.sort((a,b)=> new Date(b.date) - new Date(a.date));
        renderFeatured(allPosts.slice(0, 3));
        renderPage();
    } catch (e) { 
        console.error("Data load failed", e); 
        document.getElementById('articles').innerHTML = "<p>Failed to load content. Please refresh.</p>";
    }
}

function renderFeatured(posts){
    const container = document.getElementById('featured');
    if(posts.length === 0) return;
    container.innerHTML = posts.map(p => `
        <a href="${p.url}" class="featured-card">
            <img src="${fixPath(p.image)}" alt="${p.title}" loading="lazy">
            <div class="featured-content">
                <span class="badge">${p.category || 'Trending'}</span>
                <h3>${p.title}</h3>
                <p>${p.description ? p.description.substring(0, 100) + '...' : 'Explore our latest guide.'}</p>
            </div>
        </a>
    `).join('');
}

function renderPage(){
    const start = (currentPage-1) * perPage;
    const pagePosts = allPosts.slice(start, start + perPage);
    const container = document.getElementById('articles');
    container.innerHTML = pagePosts.map(p => `
        <a href="${p.url}" class="article-item">
            <img src="${fixPath(p.image)}" alt="${p.title}">
            <div class="article-info">
                <span style="color:var(--blue); font-size:0.7rem; font-weight:800; text-transform:uppercase; display:block; margin-bottom:4px;">${p.category}</span>
                <h3>${p.title}</h3>
                <p>${p.description ? p.description.substring(0, 85) + '...' : 'Click to read more.'}</p>
            </div>
        </a>
    `).join('');
    renderPagination();
}

function renderPagination(){
    const totalPages = Math.ceil(allPosts.length / perPage);
    const container = document.getElementById('pagination');
    if(totalPages <= 1) { container.innerHTML = ''; return; }
    let buttons = '';
    for(let i=1; i<=totalPages; i++){
        buttons += `<button class="${i===currentPage?'active':''}" onclick="goToPage(${i})">${i}</button>`;
    }
    container.innerHTML = buttons;
}

function goToPage(page){
    currentPage = page;
    renderPage();
    window.scrollTo({top: 450, behavior: 'smooth'});
}

document.getElementById('searchInput').addEventListener('input', function(){
    const val = this.value.toLowerCase();
    const filtered = allPosts.filter(p => 
        p.title.toLowerCase().includes(val) || 
        (p.description && p.description.toLowerCase().includes(val)) ||
        p.category.toLowerCase().includes(val)
    );
    const featSection = document.getElementById('featured-section');
    const container = document.getElementById('articles');
    const pagin = document.getElementById('pagination');
    if(val.length > 0) {
        featSection.style.display = 'none';
        pagin.style.display = 'none';
        container.innerHTML = filtered.map(p => `
            <a href="${p.url}" class="article-item">
                <img src="${fixPath(p.image)}">
                <div class="article-info">
                    <h3>${p.title}</h3>
                    <p>${p.description || ''}</p>
                </div>
            </a>
        `).join('');
    } else {
        featSection.style.display = 'block';
        pagin.style.display = 'flex';
        renderPage();
    }
});

loadPosts();
</script>
