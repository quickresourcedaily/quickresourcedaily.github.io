<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickResourceDaily</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>
:root{
  --bg:#f8fafc;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e2e8f0;
  --primary:#2563eb;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.6;
}

header{
  background:white;
  border-bottom:1px solid var(--border);
  padding:16px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header h1{
  font-size:20px;
  margin:0;
}

.hero{
  padding:60px 20px;
  text-align:center;
  background:#0f172a;
  color:white;
}

.hero h2{
  font-size:2.5rem;
  margin-bottom:20px;
}

#searchInput{
  padding:14px 20px;
  width:100%;
  max-width:500px;
  border-radius:30px;
  border:none;
  outline:none;
}

.container{
  max-width:1100px;
  margin:40px auto;
  padding:0 20px;
}

.section-title{
  font-size:1.5rem;
  margin:40px 0 20px;
}

.featured-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

.featured-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  transition:0.2s;
}

.featured-card:hover{
  transform:translateY(-4px);
}

.featured-card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.featured-content{
  padding:15px;
}

.featured-content h3{
  margin:0;
  font-size:1.1rem;
}

.featured-content p{
  font-size:0.9rem;
  color:var(--muted);
}

.article-list{
  margin-top:20px;
}

.article-item{
  display:flex;
  gap:20px;
  padding:20px 0;
  border-bottom:1px solid var(--border);
  text-decoration:none;
  color:inherit;
}

.article-item img{
  width:160px;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

.article-info h3{
  margin:0;
}

.article-info p{
  font-size:0.9rem;
  color:var(--muted);
}

.pagination{
  display:flex;
  justify-content:center;
  margin:40px 0;
  gap:10px;
}

.pagination button{
  padding:8px 14px;
  border:1px solid var(--border);
  background:white;
  cursor:pointer;
  border-radius:6px;
}

.pagination button.active{
  background:var(--primary);
  color:white;
}

@media(max-width:700px){
  .article-item{
    flex-direction:column;
  }
  .article-item img{
    width:100%;
    height:200px;
  }
}
</style></head><body><header>
<h1>QuickResourceDaily</h1>
</header><section class="hero">
<h2>Master the Digital Frontier</h2>
<input id="searchInput" placeholder="Search articles...">
</section><div class="container"><h2 class="section-title">🔥 Featured Posts</h2>
<div class="featured-grid" id="featured"></div><h2 class="section-title">Latest Articles</h2>
<div class="article-list" id="articles"></div><div class="pagination" id="pagination"></div></div><script>
let allPosts = [];
const perPage = 5;
let currentPage = 1;

async function loadPosts(){
  const res = await fetch('/index.json');
  const posts = await res.json();

  posts.sort((a,b)=> new Date(b.date)-new Date(a.date));
  allPosts = posts;

  renderFeatured(posts.slice(0,3));
  renderPage();
}

function renderFeatured(posts){
  const container = document.getElementById('featured');
  container.innerHTML = posts.map(p => `
    <a href="${p.url}" class="featured-card">
      <img src="${p.image}">
      <div class="featured-content">
        <h3>${p.title}</h3>
        <p>${p.description}</p>
      </div>
    </a>
  `).join('');
}

function renderPage(){
  const start = (currentPage-1)*perPage;
  const end = start + perPage;
  const pagePosts = allPosts.slice(start,end);

  const container = document.getElementById('articles');
  container.innerHTML = pagePosts.map(p => `
    <a href="${p.url}" class="article-item">
      <img src="${p.image}">
      <div class="article-info">
        <h3>${p.title}</h3>
        <p>${p.description}</p>
      </div>
    </a>
  `).join('');

  renderPagination();
}

function renderPagination(){
  const totalPages = Math.ceil(allPosts.length / perPage);
  const container = document.getElementById('pagination');

  let buttons = '';
  for(let i=1;i<=totalPages;i++){
    buttons += `<button class="${i===currentPage?'active':''}" onclick="goToPage(${i})">${i}</button>`;
  }

  container.innerHTML = buttons;
}

function goToPage(page){
  currentPage = page;
  renderPage();
}

// Search

document.getElementById('searchInput').addEventListener('input', function(){
  const val = this.value.toLowerCase();

  const filtered = allPosts.filter(p =>
    p.title.toLowerCase().includes(val) ||
    p.description.toLowerCase().includes(val)
  );

  renderFeatured(filtered.slice(0,3));

  const container = document.getElementById('articles');
  container.innerHTML = filtered.map(p => `
    <a href="${p.url}" class="article-item">
      <img src="${p.image}">
      <div class="article-info">
        <h3>${p.title}</h3>
        <p>${p.description}</p>
      </div>
    </a>
  `).join('');

  document.getElementById('pagination').innerHTML = '';
});

loadPosts();
</script></body>
</html>
