<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert Tech Guides & Android Fixes | QuickResourceDaily</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --dark: #0f172a; --light: #f8fafc; --text: #475569; --white: #ffffff; --border: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: var(--light); color: var(--text); margin: 0; }
        
        nav { background: var(--white); padding: 1rem 2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .logo { font-weight: 800; color: var(--dark); text-decoration: none; }

        .header-section { background: var(--dark); color: white; padding: 60px 20px; text-align: center; }
        .header-section h1 { font-size: 2.5rem; margin-bottom: 10px; }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        
        /* GRID FOR TECH CARDS */
        #tech-feed {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .tech-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            text-decoration: none;
            color: inherit;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
        }

        .tech-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-color: var(--primary); }
        .tag { color: var(--primary); font-weight: 800; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 10px; }
        .tech-card h2 { margin: 0 0 10px 0; font-size: 1.25rem; color: var(--dark); }
        .tech-card p { font-size: 0.9rem; flex-grow: 1; margin-bottom: 20px; color: var(--text); }
        .date { font-size: 0.8rem; color: #94a3b8; }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">QuickResourceDaily</a>
    <a href="index.html" style="text-decoration:none; color:var(--primary); font-weight:700;">← Home</a>
</nav>

<header class="header-section">
    <h1>🛠 Tech Troubleshooting & Guides</h1>
    <p>Step-by-step solutions for Android, Windows, and AI tools.</p>
</header>

<main class="container">
    <div id="tech-feed">
        <p>Scanning for the latest fixes...</p>
    </div>
</main>

<script>
    async function loadTechGuides() {
        try {
            const response = await fetch('articles.json');
            const articles = await response.json();
            const feed = document.getElementById('tech-feed');
            
            // THE FILTER: Only show "Tech Guides" or "Android Fix"
            const techOnly = articles.filter(post => 
                post.category === "Tech Guides" || post.category === "Android Fix"
            );

            if (techOnly.length === 0) {
                feed.innerHTML = "<p>No tech guides found. Add some to articles.json!</p>";
                return;
            }

            feed.innerHTML = techOnly.map(post => `
                <a href="${post.url}" class="tech-card">
                    <span class="tag">${post.category}</span>
                    <h2>${post.title}</h2>
                    <p>${post.description}</p>
                    <span class="date">Fix Verified: ${post.date}</span>
                </a>
            `).join('');
            
        } catch (e) {
            console.error("Error loading Tech Guides:", e);
        }
    }
    window.onload = loadTechGuides;
</script>

</body>
</html>
