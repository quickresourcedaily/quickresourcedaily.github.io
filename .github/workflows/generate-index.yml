name: Generate Index JSON

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate index.json
        run: |
          echo "[" > index.json
          first=true

          for file in blog/*.html
          do
            title=$(grep -i "title:" "$file" | head -1 | sed 's/.*title://; s///' | tr -d '"' | tr -d "'" | xargs)
            if [ -z "$title" ]; then
              title=$(grep -oP '(?<=<title>).*?(?=</title>)' "$file" | head -1 | xargs)
            fi

            description=$(grep -i "description:" "$file" | head -1 | sed 's/.*description://; s///' | tr -d '"' | tr -d "'" | xargs)
            if [ -z "$description" ]; then
              description=$(grep -oP '(?<=<meta name="description" content=").*?(?=")' "$file" | head -1 | xargs)
            fi

            image=$(grep -i "image:" "$file" | head -1 | sed 's/.*image://; s///' | tr -d '"' | tr -d "'" | xargs)
            if [ -z "$image" ]; then
              image=$(grep -oP '(?<=<meta property="og:image" content=").*?(?=")' "$file" | head -1 | xargs)
            fi
            if [ -z "$image" ]; then
              image=$(grep -oP '(?<=<img src=").*?(?=")' "$file" | head -1 | xargs)
            fi

            category=$(grep -i "category:" "$file" | head -1 | sed 's/.*category://; s///' | tr -d '"' | tr -d "'" | xargs)
            if [ -z "$category" ]; then
              category=$(grep -oP '(?<=<meta name="category" content=").*?(?=")' "$file" | head -1 | xargs)
            fi
            if [ -z "$category" ]; then category="Tech"; fi

            date=$(grep -i "date:" "$file" | head -1 | sed 's/.*date://; s///' | tr -d '"' | tr -d "'" | xargs)
            if [ -z "$date" ]; then date=$(date +%Y-%m-%d); fi

            url="/blog/$(basename "$file")"

            if [ -n "$title" ]; then
              if [ "$first" = true ]; then
                first=false
              else
                echo "," >> index.json
              fi

              title_json=$(echo "$title" | sed 's/"/\\"/g')
              desc_json=$(echo "$description" | sed 's/"/\\"/g')

              echo "  {" >> index.json
              echo "    \"title\": \"$title_json\"," >> index.json
              echo "    \"description\": \"$desc_json\"," >> index.json
              echo "    \"category\": \"$category\"," >> index.json
              echo "    \"date\": \"$date\"," >> index.json
              echo "    \"image\": \"$image\"," >> index.json
              echo "    \"url\": \"$url\"" >> index.json
              echo "  }" >> index.json
            fi
          done

          echo "]" >> index.json

      - name: Commit and push index.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add index.json
          git commit -m "Auto update index.json" || echo "No changes"
          git push
