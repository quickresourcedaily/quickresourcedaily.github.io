- name: Generate index.json
        run: |
          echo "[" > index.json
          first=true

          for file in blog/*.html
          do
            # 1. Try to find Title (Comment block first, then <title> tag)
            title=$(grep -m 1 "title:" "$file" | sed 's/.*title: //; s/^"//; s/"$//' | sed 's/<\/title>//')
            if [ -z "$title" ]; then
              title=$(grep -oP '(?<=<title>).*?(?=</title>)' "$file" | head -1)
            fi

            # 2. Try to find Description (Comment block first, then Meta tag)
            description=$(grep -m 1 "description:" "$file" | sed 's/.*description: //; s/^"//; s/"$//' | sed 's/".*//')
            if [ -z "$description" ]; then
              description=$(grep -oP '(?<=<meta name="description" content=").*?(?=")' "$file" | head -1)
            fi

            # 3. Try to find Image (Comment block first, then og:image, then first <img> tag)
            image=$(grep -m 1 "image:" "$file" | sed 's/.*image: //; s/^"//; s/"$//' | sed 's/".*//')
            if [ -z "$image" ]; then
              image=$(grep -oP '(?<=<meta property="og:image" content=").*?(?=")' "$file" | head -1)
            fi
            if [ -z "$image" ]; then
              image=$(grep -oP '(?<=<img src=").*?(?=")' "$file" | head -1)
            fi

            # 4. Clean up the URL
            url="/blog/$(basename "$file")"
            
            # 5. Get Category (Default to 'General' if missing)
            category=$(grep -m 1 "category:" "$file" | sed 's/.*category: //; s/^"//; s/"$//' | sed 's/".*//')
            if [ -z "$category" ]; then category="General"; fi

            if [ "$first" = true ]; then
              first=false
            else
              echo "," >> index.json
            fi

            echo "  {" >> index.json
            echo "    \"title\": \"$title\"," >> index.json
            echo "    \"description\": \"$description\"," >> index.json
            echo "    \"category\": \"$category\"," >> index.json
            echo "    \"image\": \"$image\"," >> index.json
            echo "    \"url\": \"$url\"" >> index.json
            echo "  }" >> index.json
          done

          echo "]" >> index.json
