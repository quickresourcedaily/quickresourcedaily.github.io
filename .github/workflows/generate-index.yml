name: Generate Index JSON

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate index.json
        run: |
          echo "[" > index.json

          first=true

          for file in blog/*.html
          do
            title=$(grep -m 1 "title:" "$file" | sed 's/.*title: *//; s/[",]//g')
            description=$(grep -m 1 "description:" "$file" | sed 's/.*description: *//; s/[",]//g')
            category=$(grep -m 1 "category:" "$file" | sed 's/.*category: *//; s/[",]//g')
            date=$(grep -m 1 "date:" "$file" | sed 's/.*date: *//; s/[",]//g')
            image=$(grep -m 1 "image:" "$file" | sed 's/.*image: *//; s/[",]//g')
            url="/blog/$(basename "$file")"

            if [ "$first" = true ]; then
              first=false
            else
              echo "," >> index.json
            fi

            cat >> index.json <<EOF
  {
    "title": "$title",
    "description": "$description",
    "category": "$category",
    "date": "$date",
    "image": "$image",
    "url": "$url"
  }
EOF

          done

          echo "]" >> index.json

      - name: Commit and push index.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add index.json
          git commit -m "Auto update index.json" || echo "No changes"
          git push
